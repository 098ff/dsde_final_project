version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    PYTHONPATH: /opt/airflow
    # เพิ่ม Secret Key ตรงนี้เพื่อให้ทุก Service ใน Airflow ใช้ Key เดียวกัน
    AIRFLOW__WEBSERVER__SECRET_KEY: 'a_very_secure_random_string_for_airflow_webserver_12345'
  volumes:
    # 2️⃣ ผูกโฟลเดอร์ต่างๆ ตามโครงสร้างของคุณ
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./credentials:/opt/airflow/credentials
    - ./output_data:/opt/airflow/output_data
    - ./validation:/opt/airflow/validation
    
    # ถ้า DAG ของคุณรันไฟล์ PDF จากโฟลเดอร์นี้ในเครื่อง (เหมือนในไฟล์ pipeline.ipynb) ให้เปิดใช้บรรทัดล่างนี้:
    # - ./อำเภอบ้านไร่:/opt/airflow/อำเภอบ้านไร่
    
    # ถ้าคุณมีการ import module จากโฟลเดอร์ typhoon ที่อยู่ในเครื่องด้วย ให้เปิดใช้บรรทัดล่างนี้:
    # - ./typhoon:/opt/airflow/typhoon
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume: